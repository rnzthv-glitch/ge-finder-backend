<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Inquiries - GE Finder</title>
    <style>
        :root { --primary: #2d5a27; --light: #f4fbf4; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: url('bg.png') no-repeat center fixed; 
            background-size: cover; 
        }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: -1; }
        
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        
        .inquiry-item { 
            border: 1px solid #eee; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            background: #fff;
        }
        
        .reply-section { 
            background: #f0f7f0; 
            padding: 15px; 
            border-radius: 8px; 
            margin-top: 15px; 
            border-left: 5px solid var(--primary); 
        }
        
        .status-tag { 
            font-size: 0.8rem; 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 style="color: var(--primary); margin-top:0;">My Sent Inquiries</h1>
            <p id="welcomeMsg">Welcome!</p>
            <hr>
            <div id="inquiryList">Loading your history...</div>
            <br>
            <a href="index.html" style="text-decoration: none; color: var(--primary); font-weight: bold;">← Back to Search</a>
        </div>
    </div>

    <script>
        async function loadClientHistory() {
            const name = localStorage.getItem('userName');
            document.getElementById('welcomeMsg').innerText = `Hello, ${name}. Here is the status of your requests:`;
            const list = document.getElementById('inquiryList');

            try {
                // Fetch only inquiries belonging to this client
                const response = await fetch(`https://ge-finder-backend.onrender.com/api/client-inquiries?name=${encodeURIComponent(name)}`);
                const inquiries = await response.json();
                
                list.innerHTML = "";

                if (inquiries.length === 0) {
                    list.innerHTML = "<p style='color:#666;'>You haven't sent any inquiries yet.</p>";
                    return;
                }

                inquiries.reverse().forEach(inq => {
                    // Generate chat bubbles
                    const chatHtml = inq.messages.map(msg => `
                        <div style="margin-bottom: 12px; text-align: ${msg.sender === 'client' ? 'right' : 'left'};">
                            <div style="display: inline-block; padding: 10px 15px; border-radius: 15px; 
                                background: ${msg.sender === 'client' ? 'var(--primary)' : '#e9ecef'}; 
                                color: ${msg.sender === 'client' ? 'white' : '#333'}; 
                                max-width: 80%; word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                                <strong>${msg.sender === 'client' ? 'You' : 'Engineer'}:</strong> ${msg.text}
                            </div>
                            <div style="font-size: 0.65rem; color: #999; margin-top: 4px;">
                                ${new Date(msg.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                            </div>
                        </div>
                    `).join('');

                    list.innerHTML += `
                        <div class="inquiry-item" style="border-left: 5px solid var(--primary);">
                            <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom: 15px;">
                                <strong>Project: ${inq.location} (${inq.lotSize} sqm)</strong>
                            </div>
                            
                            <div style="background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; max-height: 250px; overflow-y: auto;">
                                ${chatHtml}
                            </div>

                            <div style="display: flex; gap: 8px;">
                                <input type="text" id="reply-text-${inq._id}" placeholder="Type a follow-up message..." style="flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
                                <button class="btn" style="background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer;" onclick="sendClientReply('${inq._id}')">Send</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                list.innerHTML = "<p style='color:red;'>Failed to load inquiries. Please check your connection.</p>";
            }
        }
        loadClientHistory();

        async function sendClientReply(inquiryId) {
            const text = document.getElementById(`reply-text-${inquiryId}`).value;
            const token = localStorage.getItem('token');

            if (!text.trim()) return alert("Please type a message.");

            try {
                // Uses the new route for back-and-forth messaging
                const response = await fetch(`https://ge-finder-backend.onrender.com/api/inquiries/${inquiryId}/message`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ sender: 'client', text: text })
                });

                if (response.ok) {
                    location.reload(); // Refresh to see the new message bubbles
                } else {
                    alert("Failed to send message.");
                }
            } catch (err) {
                alert("Connection error. Check if your server is running.");
            }
        }

    </script>
</body>
</html>
